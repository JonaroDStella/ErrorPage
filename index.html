<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>503 - Taking a Break | CCMC Corporation</title>
    <!-- Importing Geologica for Headings and Noto Sans for Body -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geologica:wght@100..900&family=Noto+Sans:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link href="style.css", rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>

    <div class="container" id="service">
        <div class="logo-container">
            <img src="https://ccmc-corp.com/wp-content/themes/ccmc/assets/img/global/logo.svg" alt="holoindie logo">
        </div>

        <div class="error-label">Service Interrupted</div>

        <div class="intro">
            <div class="inner">
                <div class="bg">
                    <div class="image"></div>
                </div>
                <div class="page-ttl-box">
                    <h2 id="error-value">Error 503</h2>
                </div>
                <div class="text">
                    The stage is being reset. Our technical staff and talents are currently working to bring the show back online.
                </div>
            </div>
        </div>

        <div class="controls-wrapper">
            <!-- Character Animation Box -->
            <div id="character" class="character-container">
                <div id="error" class="error-layer"></div>
                <div id="char-leg" class="char-layer"></div>
                <div id="char-body" class="char-layer"></div>
            </div>
            <div id="hint" class="click-hint">Click Kaela</div>

            <div class="loading-container">
                <div id="progress" class="loading-bar"></div>
            </div>
            <div id="status" class="status-text text-sm font-bold uppercase tracking-widest text-[#2F3380]">Reconnecting...</div>

            <button class="btn-retry" onclick="location.reload()">Reload Stage</button>
        </div>
    </div>

    <script>
        // Assets Mapping
        const bodyFrames = ['body0.png', 'body1.png'];
        const legFrames = ['leg0.png', 'leg1.png', 'leg2.png'];

        const charBody = document.getElementById('char-body');
        const charLeg = document.getElementById('char-leg');
        const character = document.getElementById('character');
        const error = document.getElementById('error');
        const errorDisplay = document.getElementById('error-value');
        const bar = document.getElementById('progress');
        const statusText = document.getElementById('status');
        const hint = document.getElementById('hint');

        const killSound = new Audio('sounds/bonk.mp3');
        killSound.volume = 0.3;
        
        let currentFrame = 0;
        let isFollowing = false;
        let facingRight = false;
        let legToggle = false;
        let walkToggle = false;
        
        // --- Animation Engine ---
        let startTime = Date.now();
        
        // --- Mouse Follow Logic ---
        let mouseX = window.innerWidth / 2;
        let mouseY = window.innerHeight / 2;
        let charX = window.innerWidth / 2;
        let charY = window.innerHeight / 2;
        let moveSpeed = 2;

        let errorCode = 503;
        let enemies = [];
        let lastSpawnTime = 0;
        let legImg = legFrames[0];
        const spawnInterval = 600; 

        function updateAnimation() {
            const now = Date.now();
            const elapsed = (now - startTime) / 1000; // seconds
            
            const sinVal = Math.sin(elapsed * 30);
            
            const scaleY = 1.0 + (0.05 * sinVal);
            
            const bodyImg = sinVal > 0 ? bodyFrames[0] : bodyFrames[1];

            charBody.style.backgroundImage = `url('sprites/${bodyImg}')`;
            
            const baseTransform = isFollowing ? `translate(-50%, -100%)` : `scale(1)`;
            const flipTransform = facingRight ? `scaleX(-1)` : `scaleX(1)`;
            character.style.transform = `${baseTransform} ${flipTransform} scaleY(${scaleY})`;

            // Follow Logic
            if (isFollowing) {
                if (mouseX > charX) {
                    facingRight = true;
                } else if (mouseX < charX) {
                    facingRight = false;
                }

                const dx = mouseX - charX;
                const dy = mouseY - charY;
                const distance = Math.sqrt(dx * dx + dy * dy);
                
                if (distance > moveSpeed) {
                    charX += (dx / distance) * moveSpeed;
                    charY += (dy / distance) * moveSpeed;
                    if (sinVal > 0){
                        if (!walkToggle){
                            legImg = legToggle ? legFrames[1] : legFrames[2];
                            legToggle = !legToggle;
                            walkToggle = true;
                        }
                    }else{
                        legImg = legFrames[0];
                        walkToggle = false;
                    }
                } else {
                    legImg = legFrames[0];
                    charX = mouseX;
                    charY = mouseY;
                }

                character.style.left = charX + 'px';
                character.style.top = charY + 'px';

                if (now - lastSpawnTime > spawnInterval && errorCode > 0) {
                    spawnEnemy();
                    lastSpawnTime = now;
                }

                for (let i = enemies.length - 1; i >= 0; i--) {
                    const e = enemies[i];
                    
                    if (e.isDying) continue;
                    
                    e.x += e.vx;
                    e.y += e.vy;

                    if (e.x < 10 || e.x > window.innerWidth - 50) e.vx *= -1;
                    if (e.y < 10 || e.y > window.innerHeight - 30) e.vy *= -1;

                    e.el.style.left = e.x + 'px';
                    e.el.style.top = e.y + 'px';

                    const edx = charX - e.x;
                    const edy = (charY - 50) - (e.y + 25); // Target center of image
                    const dist = Math.sqrt(edx * edx + edy * edy);

                    if (dist < 100) {
                        killEnemy(e, i);
                        killSound.currentTime = 0;
                        killSound.play();
                    }
                }
            }else{
                const bodyImg = sinVal > 0 ? bodyFrames[0] : bodyFrames[1];
                error.style.backgroundImage = sinVal > 0 ? `url('sprites/error0.png')` : `url('sprites/error1.png')`;
            }
            charLeg.style.backgroundImage = `url('sprites/${legImg}')`;

            requestAnimationFrame(updateAnimation);
        }

        function spawnEnemy() {
            const x = Math.random() * (window.innerWidth - 60) + 30;
            const y = Math.random() * (window.innerHeight - 60) + 30;

            const el = document.createElement('div');
            el.className = 'enemy';
            el.style.left = x + 'px';
            el.style.top = y + 'px';
            document.body.appendChild(el);
            
            setTimeout(() => el.style.opacity = '1', 10);

            const angle = Math.random() * Math.PI * 2;
            const speed = 2 + Math.random() * 2;

            enemies.push({
                el: el,
                x: x,
                y: y,
                vx: Math.cos(angle) * speed,
                vy: Math.sin(angle) * speed,
                isDying: false
            });
        }

        function killEnemy(enemy, index) {
            enemy.isDying = true;
            enemy.el.classList.add('dying');
            
            setTimeout(() => {
                enemy.el.remove();
                const currentIdx = enemies.indexOf(enemy);
                if (currentIdx > -1) enemies.splice(currentIdx, 1);
            }, 400);

            decreaseError();
        }

        function decreaseError() {
            if (errorCode <= 0) return;
            
            errorCode -= 10;
            moveSpeed += 0.1;
            if (errorCode < 0) errorCode = 0;
            
            errorDisplay.innerText = `Error ${errorCode}`;
            
            errorDisplay.style.transform = 'scale(1.2) rotate(2deg)';
            errorDisplay.style.color = 'var(--hi-blue)';
            setTimeout(() => {
                errorDisplay.style.transform = 'scale(1) rotate(0deg)';
                errorDisplay.style.color = 'var(--hi-service-blue)';
            }, 150);

            if (errorCode === 0) {
                statusText.innerText = "CONNECTION SECURED! REBOOTING...";
                statusText.style.color = "var(--hi-blue)";
                enemies.forEach(e => e.el.remove());
                enemies = [];
                setTimeout(() => location.reload(), 2500);
            }
        }

        character.addEventListener('click', () => {
            if (!isFollowing) {
                const rect = character.getBoundingClientRect();
                charX = rect.left + rect.width / 2;
                charY = rect.top + rect.height / 2;
                
                isFollowing = true;
                character.classList.add('following');
                error.hidden = true;
                hint.style.display = 'none';
                
                // Speed up animation when following to signify "running/moving"
                clearInterval(animInterval);
                animInterval = setInterval(updateCharacterAnimation, 150);
            }
        });

        window.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        // --- Progress Bar Logic ---
        const messages = [
            "Gathering Assets...",
            "Tuning Instruments...",
            "Dressing up...",
            "Cheering up Holo Staff...",
            "Mic Check..."
        ];
        let width = 0;

        function animateLoading() {
            setInterval(() => {
                if (width >= 100) {
                    width = 0;
                    if (errorCode != 0)
                        statusText.innerText = messages[Math.floor(Math.random() * messages.length)];
                } else {
                    width += Math.random() * 4;
                    if (width > 100) width = 100;
                    bar.style.width = width + '%';
                }
            }, 100);
        }

        // --- Initialization ---
        let animInterval;
        window.onload = () => {
            animateLoading();
            requestAnimationFrame(updateAnimation);
        };
    </script>
</body>
</html>
